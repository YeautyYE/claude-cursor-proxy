name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build/publish (e.g. v0.1.21). Leave empty to build HEAD without publishing.'
        required: false
        type: string

permissions:
  contents: write

env:
  BIN_NAME: claude-cursor-bridge
  CARGO_TERM_COLOR: always

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked --all

  build:
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin-arm64
            archive: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            platform: darwin-amd64
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-amd64
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-amd64
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows-arm64
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            REF="${{ inputs.tag }}"
          else
            REF="${GITHUB_REF_NAME}"
          fi
          if [[ "$REF" == v* ]]; then
            VERSION="${REF#v}"
          else
            VERSION="$(cargo metadata --no-deps --format-version 1 | sed -n 's/.*"version":"\([^"]*\)".*/\1/p' | head -1)"
          fi
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify Unix binary
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          expected="${BIN_NAME} ${VERSION}"
          actual="$(target/${{ matrix.target }}/release/${BIN_NAME} --version)"
          test "$actual" = "$expected"

      - name: Verify Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $expected = "${env:BIN_NAME} $($env:VERSION)"
          $actual = & "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" --version
          if ($actual -ne $expected) {
            Write-Error "expected '$expected', got '$actual'"
          }

      - name: Package Unix
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${BIN_NAME}"
          chmod +x "dist/${BIN_NAME}"

          # Versioned name (preferred) + platform alias for install scripts
          versioned="${BIN_NAME}-${VERSION}-${PLATFORM}.tar.gz"
          alias_name="${BIN_NAME}-${PLATFORM}.tar.gz"
          tar -C dist -czf "$versioned" "${BIN_NAME}"
          cp "$versioned" "$alias_name"

          shasum -a 256 "$versioned" > "${BIN_NAME}-${VERSION}-${PLATFORM}.sha256"
          shasum -a 256 "$alias_name" > "${BIN_NAME}-${PLATFORM}.sha256"

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "dist/${BIN_NAME}.exe"

          versioned="${BIN_NAME}-${VERSION}-${PLATFORM}.zip"
          alias_name="${BIN_NAME}-${PLATFORM}.zip"
          # Prefer zip CLI for predictable archives; fall back to PowerShell.
          if command -v zip >/dev/null 2>&1; then
            (cd dist && zip -q "../${versioned}" "${BIN_NAME}.exe")
          else
            powershell.exe -NoProfile -Command "Compress-Archive -Path 'dist/${BIN_NAME}.exe' -DestinationPath '${versioned}' -Force"
          fi
          cp "$versioned" "$alias_name"

          # LF-only checksum lines so `sha256sum -c SHA256SUMS.txt` works on Unix.
          if command -v sha256sum >/dev/null 2>&1; then
            hash_v="$(sha256sum "$versioned" | awk '{print tolower($1)}')"
            hash_a="$(sha256sum "$alias_name" | awk '{print tolower($1)}')"
          elif command -v shasum >/dev/null 2>&1; then
            hash_v="$(shasum -a 256 "$versioned" | awk '{print tolower($1)}')"
            hash_a="$(shasum -a 256 "$alias_name" | awk '{print tolower($1)}')"
          else
            hash_v="$(powershell.exe -NoProfile -Command "(Get-FileHash -Algorithm SHA256 '${versioned}').Hash.ToLower()")"
            hash_a="$(powershell.exe -NoProfile -Command "(Get-FileHash -Algorithm SHA256 '${alias_name}').Hash.ToLower()")"
            hash_v="$(echo "$hash_v" | tr -d '\r\n')"
            hash_a="$(echo "$hash_a" | tr -d '\r\n')"
          fi
          printf '%s  %s\n' "$hash_v" "$versioned" > "${BIN_NAME}-${VERSION}-${PLATFORM}.sha256"
          printf '%s  %s\n' "$hash_a" "$alias_name" > "${BIN_NAME}-${PLATFORM}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            ${{ env.BIN_NAME }}-*.tar.gz
            ${{ env.BIN_NAME }}-*.zip
            ${{ env.BIN_NAME }}-*.sha256

  smoke-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-amd64
      - shell: pwsh
        run: |
          $zip = Get-ChildItem -Filter "claude-cursor-bridge-*-windows-amd64.zip" | Select-Object -First 1
          Expand-Archive $zip.FullName -DestinationPath .
          .\claude-cursor-bridge.exe --version

  release:
    if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
    needs: [build, smoke-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Build combined checksums
        run: |
          cat claude-cursor-bridge-*.sha256 | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
            *.sha256
            SHA256SUMS.txt
